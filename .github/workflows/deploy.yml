name: Build & Deploy to Oracle Cloud (k8s)

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build imagen Docker y push a GHCR
  # ─────────────────────────────────────────
  build-and-push:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.vars.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: vars
        run: echo "image=${{ env.REGISTRY }}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up QEMU (ARM64 cross-compile)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 2: Deploy en Kubernetes (k3s)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code (manifests)
        uses: actions/checkout@v4

      - name: Set image tag and lowercase repo
        id: vars
        run: |
          echo "image=${{ env.REGISTRY }}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Generar archivos de deploy en el runner
        id: files
        run: |
          IMAGE_TAG=${{ steps.vars.outputs.image }}

          # secrets.env — valores entre comillas simples para evitar expansión en bash
          cat > secrets.env << 'ENVEOF'
          NODE_ENV=${{ secrets.NODE_ENV }}
          PORT=4000
          MONGO_URI=${{ secrets.MONGO_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
          APP_URL=${{ secrets.APP_URL }}
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM=${{ secrets.EMAIL_FROM }}
          SUPPORT_EMAIL=${{ secrets.SUPPORT_EMAIL }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_SECURE=${{ secrets.SMTP_SECURE }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          GITHUB_TOKEN=${{ secrets.GH_TOKEN }}
          GITHUB_WEBHOOK_SECRET=${{ secrets.GH_WEBHOOK_SECRET }}
          WPP_SESSION_PATH=${{ secrets.WPP_SESSION_PATH }}
          ENVEOF

          # deployment con imagen ya reemplazada
          sed "s|IMAGE_PLACEHOLDER|$IMAGE_TAG|g" k8s/deployment.yml > k8s/deployment-final.yml

      - name: Copiar archivos a la VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          source: k8s/,secrets.env
          target: /opt/hub-backend

      - name: Deploy on VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN_VAL: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          envs: IMAGE_TAG,GITHUB_ACTOR,GITHUB_TOKEN_VAL
          script: |
            set -e
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            # ── 1. Namespace y recursos base ──
            kubectl apply -f /opt/hub-backend/k8s/namespace.yml
            kubectl apply -f /opt/hub-backend/k8s/pvc.yml
            kubectl apply -f /opt/hub-backend/k8s/service.yml
            kubectl apply -f /opt/hub-backend/k8s/hpa.yml

            # ── 2. Secret de GHCR para pull de imagen privada ──
            kubectl create secret docker-registry ghcr-secret \
              --namespace=hub \
              --docker-server=ghcr.io \
              --docker-username="$GITHUB_ACTOR" \
              --docker-password="$GITHUB_TOKEN_VAL" \
              --dry-run=client -o yaml | kubectl apply -f -

            # ── 3. Secret de variables de entorno (desde archivo, evita problemas con chars especiales) ──
            kubectl create secret generic hub-backend-secret \
              --namespace=hub \
              --from-env-file=/opt/hub-backend/secrets.env \
              --dry-run=client -o yaml | kubectl apply -f -

            # Eliminar el archivo de secrets de la VM por seguridad
            rm -f /opt/hub-backend/secrets.env

            # ── 4. Aplicar deployment con imagen nueva ──
            kubectl apply -f /opt/hub-backend/k8s/deployment-final.yml

            # ── 5. Forzar rolling update ──
            kubectl rollout restart deployment/hub-backend -n hub

            # ── 6. Esperar a que el rollout complete ──
            kubectl rollout status deployment/hub-backend -n hub --timeout=180s

            echo "✅ Deploy complete — imagen: $IMAGE_TAG — $(date)"
            kubectl get pods -n hub

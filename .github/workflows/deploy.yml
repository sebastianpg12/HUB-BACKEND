name: Build & Deploy to Oracle Cloud (k8s)

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build imagen Docker y push a GHCR
  # ─────────────────────────────────────────
  build-and-push:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.vars.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: vars
        run: echo "image=${{ env.REGISTRY }}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up QEMU (ARM64 cross-compile)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 2: Deploy en Kubernetes (k3s)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code (manifests)
        uses: actions/checkout@v4

      - name: Set image tag and lowercase repo
        id: vars
        run: |
          echo "image=${{ env.REGISTRY }}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Copy k8s manifests to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          source: k8s/
          target: /opt/hub-backend

      - name: Deploy on VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN_VAL: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          envs: IMAGE_TAG,GITHUB_ACTOR,GITHUB_TOKEN_VAL
          script: |
            set -e
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            # ── 1. Crear/actualizar namespace y recursos base ──
            kubectl apply -f /opt/hub-backend/k8s/namespace.yml
            kubectl apply -f /opt/hub-backend/k8s/pvc.yml
            kubectl apply -f /opt/hub-backend/k8s/service.yml
            kubectl apply -f /opt/hub-backend/k8s/hpa.yml

            # ── 2. Crear/actualizar secret de GHCR para pull de imagen privada ──
            kubectl create secret docker-registry ghcr-secret \
              --namespace=hub \
              --docker-server=ghcr.io \
              --docker-username="$GITHUB_ACTOR" \
              --docker-password="$GITHUB_TOKEN_VAL" \
              --dry-run=client -o yaml | kubectl apply -f -

            # ── 3. Crear/actualizar secret con variables de entorno de la app ──
            kubectl create secret generic hub-backend-secret \
              --namespace=hub \
              --from-literal=NODE_ENV="${{ secrets.NODE_ENV }}" \
              --from-literal=PORT="4000" \
              --from-literal=MONGO_URI="${{ secrets.MONGO_URI }}" \
              --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              --from-literal=JWT_EXPIRES_IN="${{ secrets.JWT_EXPIRES_IN }}" \
              --from-literal=APP_URL="${{ secrets.APP_URL }}" \
              --from-literal=CORS_ORIGINS="${{ secrets.CORS_ORIGINS }}" \
              --from-literal=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
              --from-literal=RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
              --from-literal=EMAIL_FROM="${{ secrets.EMAIL_FROM }}" \
              --from-literal=SUPPORT_EMAIL="${{ secrets.SUPPORT_EMAIL }}" \
              --from-literal=SMTP_HOST="${{ secrets.SMTP_HOST }}" \
              --from-literal=SMTP_PORT="${{ secrets.SMTP_PORT }}" \
              --from-literal=SMTP_SECURE="${{ secrets.SMTP_SECURE }}" \
              --from-literal=SMTP_USER="${{ secrets.SMTP_USER }}" \
              --from-literal=SMTP_PASS="${{ secrets.SMTP_PASS }}" \
              --from-literal=GITHUB_TOKEN="${{ secrets.GH_TOKEN }}" \
              --from-literal=GITHUB_WEBHOOK_SECRET="${{ secrets.GH_WEBHOOK_SECRET }}" \
              --from-literal=WPP_SESSION_PATH="${{ secrets.WPP_SESSION_PATH }}" \
              --dry-run=client -o yaml | kubectl apply -f -

            # ── 4. Aplicar deployment con la imagen nueva ──
            sed "s|IMAGE_PLACEHOLDER|$IMAGE_TAG|g" /opt/hub-backend/k8s/deployment.yml \
              | kubectl apply -f -

            # ── 5. Forzar rolling update (reemplaza todos los pods aunque la imagen no cambie) ──
            kubectl rollout restart deployment/hub-backend -n hub

            # ── 6. Esperar a que el rollout complete ──
            kubectl rollout status deployment/hub-backend -n hub --timeout=180s

            echo "✅ Deploy complete — imagen: $IMAGE_TAG — $(date)"
            echo ""
            kubectl get pods -n hub
